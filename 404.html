<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dirtcake Studio</title>
    <script type="text/javascript">
      // 2. The REDIRECT script: Sends the 404 path to index.html as a query string
      var pathSegs = window.location.pathname.split("/");
      var redirectUrl =
        window.location.protocol +
        "//" +
        window.location.hostname +
        (window.location.port ? ":" + window.location.port : "") +
        "/?/" +
        pathSegs.slice(1).join("/") +
        (window.location.search
          ? "&" + window.location.search.slice(1).replace(/&/g, "~and~")
          : "") +
        window.location.hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
